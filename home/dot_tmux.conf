# ============================================================================
#  ~/.tmux.conf — für nvim + Claude Code. Schnell, persistent, vim-navigierbar.
# ============================================================================

# --- Farben / Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -g focus-events on              # nötig für nvim FocusGained (Auto-Dark)
set -sg escape-time 0               # nvim reagiert sofort (kein ESC-Delay)

# --- Basics ---
set -g mouse on
set -g history-limit 100000         # CC ist geschwätzig -> großer Scrollback
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g set-clipboard on

# --- Prefix: C-a (ergonomischer als C-b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Splits im aktuellen Pfad, mit | und - ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Fenster/Reload ---
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "tmux neu geladen ✔"

# --- Pane-Resize (Prefix + H/J/K/L) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Statuszeile: folgt dem Terminal (bg=default -> Hell/Dunkel automatisch) ---
set -g status-position top
set -g status-style "bg=default,fg=colour244"
set -g status-left "#[fg=colour5,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=colour244]%d.%m  #[fg=colour5]%H:%M "
setw -g window-status-format "#[fg=colour244] #I:#W "
setw -g window-status-current-format "#[fg=colour5,bold] #I:#W "
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour5"

# ============================================================================
#  Plugins (tpm).  Erstinstallation:  Prefix + I
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'   # C-h/j/k/l: nvim <-> tmux nahtlos
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Sessions speichern
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-save/restore
set -g @plugin 'tmux-plugins/tmux-yank'           # Copy in System-Clipboard

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
